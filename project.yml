name: FinancialPlanner
options:
  bundleIdPrefix: com.presight
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""
targets:
  FinancialPlanner:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      - path: Resources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Planner
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSFaceIDUsageDescription: Planner uses Face ID to unlock your financial data on this device.
        NSCameraUsageDescription: Planner uses the camera to scan receipts and read the amount, on your device.
        UIUserInterfaceStyle: Light
        UIStatusBarStyle: UIStatusBarStyleDarkContent
        CFBundleURLTypes:
          - CFBundleURLName: com.presight.financialplanner
            CFBundleURLSchemes:
              - planner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.presight.financialplanner
        GENERATE_INFOPLIST_FILE: "NO"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: "YES"
        CODE_SIGN_ENTITLEMENTS: Sources/FinancialPlanner.entitlements
    dependencies:
      - target: PlannerWidgetExtension
        embed: true

  PlannerWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PlannerWidget
      - path: Sources/App/WidgetShared.swift
    info:
      path: PlannerWidget/Info.plist
      properties:
        CFBundleDisplayName: Planner
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.presight.financialplanner.widget
        GENERATE_INFOPLIST_FILE: "NO"
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: "YES"
        CODE_SIGN_ENTITLEMENTS: PlannerWidget/PlannerWidget.entitlements
